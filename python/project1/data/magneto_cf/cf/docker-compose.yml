services:
  cf_postgres_plm:
    image: postgres:15
    container_name: cf_aviation_plm
    restart: unless-stopped
    environment:
      POSTGRES_USER: aviation
      POSTGRES_PASSWORD: aviation123
      POSTGRES_DB: cf_plm
    ports:
      - "5471:5432"
    volumes:
      - cf_plm_data:/var/lib/postgresql/data
      - ./init-scripts/01_cf_plm_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - cf_aviation_network

  cf_postgres_erp:
