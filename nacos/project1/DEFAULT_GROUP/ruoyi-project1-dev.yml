server:
  port: 9210

spring:
  data:
    redis:
      host: localhost
      port: 6379
      password:
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: ruoyi
        loginPassword: 123456
    dynamic:
      primary: master
      strict: false
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        connectTimeout: 30000
        socketTimeout: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,slf4j
        connectionProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://localhost:3306/ry-cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
          username: root
          password: 123456

mybatis:
  typeAliasesPackage: com.ruoyi.project1.domain,com.ruoyi.project1.dossier.domain
  mapperLocations: classpath*:mapper/**/*.xml

dossier:
  export:
    root-path: D:/ruoyi/data/dossier-output

springdoc:
  gatewayUrl: http://localhost:8080/project1
  api-docs:
    enabled: true
  info:
    title: project1 digital dossier APIs
    description: project1 digital dossier component APIs
    contact:
      name: RuoYi
      url: https://ruoyi.vip
