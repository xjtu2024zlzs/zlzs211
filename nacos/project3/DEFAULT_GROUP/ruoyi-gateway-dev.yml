server:
  port: 8088

spring:
  codec:
    max-in-memory-size: 20MB
  data:
    redis:
      host: localhost
      port: 6379
      password: 
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              lowerCaseServiceId: true
              enabled: true
          routes:
            # 认证中心
            - id: ruoyi-auth
              uri: lb://ruoyi-auth
              predicates:
                - Path=/auth/**
              filters:
                # 验证码处理
                - name: CacheRequestBody
                  args:
                    bodyClass: java.lang.String
                - ValidateCodeFilter
                - StripPrefix=1
            # 代码生成
            - id: ruoyi-gen
              uri: lb://ruoyi-gen
              predicates:
                - Path=/code/**
              filters:
                - StripPrefix=1
            # 定时任务
            - id: ruoyi-job
              uri: lb://ruoyi-job
              predicates:
                - Path=/schedule/**
              filters:
                - StripPrefix=1
            # 系统模块
            - id: ruoyi-system
              uri: lb://ruoyi-system
              predicates:
                - Path=/system/**
              filters:
                - StripPrefix=1
            # 文件服务
            - id: ruoyi-file
              uri: lb://ruoyi-file
              predicates:
                - Path=/file/**
              filters:
                - StripPrefix=1           
            # HUST-project3测试路径
            - id: project3
              uri: lb://project3
              predicates:
                - Path=/project3/**
              filters:
                - StripPrefix=1
            # HUST-project3 质量业务路径
            - id: project3-quality
              uri: lb://project3
              predicates:
                - Path=/home/**,/monitor/**,/feedback/**,/service/**,/quality/**

# 安全配置
security:
  # 验证码
  captcha:
    enabled: false
    type: math
  # 防止XSS攻击
  xss:
    enabled: true
    excludeUrls:
      - /system/notice

  # 不校验白名单
  ignore:
    whites:
      - /auth/logout
      - /auth/login
      - /auth/register
      - /*/v2/api-docs
      - /*/v3/api-docs
      - /csrf
      - /project3/test
      # HUST-project3 文件下载白名单
      # 用于 Python 算法服务或外部服务直接访问文件下载地址
      - /quality/fault-iden/source-file/**
      - /quality/fault-iden/predict-source-file/**
      - /quality/fault-iden/warning-source-file/**
      - /quality/fault-iden/export-file/**

# springdoc配置
springdoc:
  webjars:
    # 访问前缀
    prefix: